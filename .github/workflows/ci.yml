name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Confirm pipeline runs
        run: echo "CI pipeline is working! Ready to add security scanning."

  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Juice Shop source code
        uses: actions/checkout@v4
        with:
          repository: juice-shop/juice-shop
          path: juice-shop-src

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        run: semgrep --config=auto juice-shop-src --json --output semgrep-results.json
        continue-on-error: true

      - name: Upload SAST scan results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json

  sca-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Juice Shop source code
        uses: actions/checkout@v4
        with:
          repository: juice-shop/juice-shop
          path: juice-shop-src

      - name: Debug - list files
        run: |
          echo "Contents of juice-shop-src:"
          ls -la juice-shop-src/ | head -20
          echo "---"
          echo "Looking for package.json and lockfiles:"
          find juice-shop-src -maxdepth 2 -name "package*.json"

      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./juice-shop-src
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM
          scanners: vuln,secret

      - name: Upload SCA scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Juice Shop source code (full history)
        uses: actions/checkout@v4
        with:
          repository: juice-shop/juice-shop
          path: juice-shop-src
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        working-directory: juice-shop-src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  image-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Juice Shop source code
        uses: actions/checkout@v4
        with:
          repository: juice-shop/juice-shop
          path: juice-shop-src

      - name: Build Docker image
        run: docker build -t juice-shop-local:latest ./juice-shop-src

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: juice-shop-local:latest
          format: json
          output: trivy-image-results.json
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload image scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-results
          path: trivy-image-results.json
